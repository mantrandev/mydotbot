- defaults:
    link:
      relink: true
      force: true

- shell:
    - command: brew bundle --file=Brewfile
      description: Install Homebrew packages and apps
      stdin: true
      stdout: true
    - command: scripts/install-vscode-extensions.sh
      description: Install VS Code extensions
      stdout: true
    - command: scripts/install-npm-globals.sh
      description: Install npm global packages
      stdout: true

- create:
    - ~/.claude
    - ~/.claude-account1
    - ~/.claude-account2
    - ~/.claude-account3
    - ~/.claude-account4
    - ~/.claude-account5
    - ~/.local/share/claude/projects
    - ~/.codex
    - ~/.codex/skills
    - ~/.pi/agent
    - ~/.agents
    - ~/.zsh

- link:
    ~/.zshrc: zsh/.zshrc
    ~/.zprofile: zsh/.zprofile
    ~/.zsh/jira.zsh: zsh/jira.zsh
    ~/.claude/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude-account1/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude-account2/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude-account3/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude-account4/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude-account5/statusline-command.sh: zsh/statusline-command.sh
    ~/.claude/CLAUDE.md: ai/AGENTS.md
    ~/.claude/skills: ai/skills
    ~/.claude/memory: ai/memory
    ~/.claude-account1/memory: ai/memory
    ~/.claude-account2/memory: ai/memory
    ~/.claude-account3/memory: ai/memory
    ~/.claude-account4/memory: ai/memory
    ~/.claude-account4/history.jsonl:
      path: ~/.local/share/claude/history.jsonl
    ~/.claude-account4/projects:
      path: ~/.local/share/claude/projects
    ~/.claude-account5/memory: ai/memory
    ~/.claude-account5/history.jsonl:
      path: ~/.local/share/claude/history.jsonl
    ~/.claude-account5/projects:
